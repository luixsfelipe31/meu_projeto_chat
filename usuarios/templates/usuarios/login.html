{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - LinguaConnect</title>

    <link rel="stylesheet" href="{% static 'usuarios/style.css' %}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
        }

        /* 🔥 NAVBAR FIXA */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            z-index: 1000;
        }

        .navbar h2 {
            color: #3b82f6;
        }

        .login-box h2 {
            color: #1e293b; /* cinza escuro bonito */
}

        .nav-links a {
            margin: 0 10px;
            text-decoration: none;
            color: #334155;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-login {
            background: #3b82f6;
            color: white;
        }

        .btn-cadastro {
            background: #22c55e;
            color: white;
        }

        /* 🔥 CENTRALIZAÇÃO REAL */
        .login-container {
            height: 55vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px; /* espaço pra navbar */
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            outline: none;
        }

        .login-box input:focus {
            border-color: #3b82f6;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .login-box button:hover {
            background: #2563eb;
        }

        .extra {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .social-login {
            display: flex;
            gap: 10px;
        }

        .social-login button {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            color: #334155;
            padding: 10px;
            border-radius: 8px;
        }

        .social-login button:hover {
            background: #f8fafc;
        }
    </style>
</head>

<body>
S

{% include 'usuarios/navbar.html' %}

<!-- 🔥 LOGIN -->
<div class="login-container">

    <div class="login-box">
        <h2>Bem-vindo de volta</h2>
        <p>Entre para continuar sua jornada de aprendizado</p>

        <form method="POST" action="/login/">
    {% csrf_token %}

    <input type="text" name="username" placeholder="E-mail" required>
    <input type="password" name="senha" placeholder="Senha" required>

    <button type="submit">Entrar</button>
   </form>

        <div class="extra">
            Ainda não tem conta? <a href="/cadastro/">Cadastre-se</a>
        </div>


    </div>

</div>

</body>
</html>
