{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Match</title>
    <link rel="stylesheet" href="{% static 'usuarios/style.css' %}?v=10">
</head>
<body>

<div class="tinder-container">

    {% for user in sugestoes %}
        <div class="tinder-card">

            <h2>👤 {{ user.username }}</h2>

            <p><strong>🌍 Nativo:</strong> {{ user.idioma_nativo }}</p>
            <p><strong>📚 Aprende:</strong> {{ user.idioma_aprendizado }}</p>
            <p><strong>🎯 Interesses:</strong> {{ user.interesses }}</p>

            <!-- 🔥 BOTÃO DE CHAT -->
            <a href="/chat/{{ user.id }}/">
                <button style="margin-top:10px;">💬 Conversar</button>
            </a>

        </div>
    {% empty %}
        <p>Nenhum match encontrado 😢</p>
    {% endfor %}

    <div class="tinder-buttons">
        <button onclick="nextCard()">❌</button>
        <button onclick="nextCard()">👍</button>
    </div>

</div>

<script>
let current = 0;
const cards = document.querySelectorAll('.tinder-card');

function showCard(index) {
    cards.forEach((card, i) => {
        card.style.display = i === index ? 'block' : 'none';
    });
}

function nextCard() {
    current++;
    if (current >= cards.length) {
        current = 0;
    }
    showCard(current);
}

showCard(current);
</script>

</body>
</html>
